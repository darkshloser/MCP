# Development overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
version: "3.8"

services:
  mcp-server:
    environment:
      - MCP_ENVIRONMENT=development
      - MCP_LOG_LEVEL=DEBUG
    volumes:
      - ./src:/app/src

  orchestrator:
    environment:
      - MCP_ENVIRONMENT=development
      - MCP_LOG_LEVEL=DEBUG
    volumes:
      - ./src:/app/src

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
